
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiNeiroCreator - Linear Redesign Prototype</title>
    <style>
      :root {
        --body-bg: #0b0b0b;
        --column-bg: #101010;
        --panel-bg: #101010;
        --hover-bg: #1a1a1a;
        --line: #262626;
        --text-primary: #e6e6e6;
        --text-secondary: #808080;
        --text-sidebar: #a0a0a0;
        --accent: #8a8a8a;
        --topbar-h: 56px;
        --app-min-width: 1420px;
        --app-min-height: 820px;
        --left-column-w: 312px;
        --right-column-w: 392px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        box-shadow: none !important;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--body-bg);
        color: var(--text-primary);
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 1.5;
      }

      body {
        overflow: auto;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0 !important;
        background: transparent;
        color: var(--text-secondary);
      }

      button:hover {
        background: var(--hover-bg);
        color: #ffffff;
        filter: brightness(1.1);
      }

      .app-shell {
        width: max(100%, var(--app-min-width));
        min-width: var(--app-min-width);
        min-height: var(--app-min-height);
        height: max(100vh, var(--app-min-height));
        padding: 0;
        background: var(--body-bg);
      }

      .app-frame {
        width: 100%;
        min-width: var(--app-min-width);
        min-height: var(--app-min-height);
        height: 100%;
        border: 0 !important;
        border-radius: 0;
        background: var(--body-bg);
        overflow: hidden;
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 16px;
        position: relative;
        min-width: var(--app-min-width);
        padding: 0 18px;
        border-bottom: 1px solid var(--line) !important;
        background: var(--column-bg);
      }

      .topbar-left,
      .topbar-center,
      .topbar-right,
      .menu-row,
      .window-controls,
      .status-row,
      .title-row {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .topbar-left {
        gap: 0;
      }

      .title-row {
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 0 !important;
        background: transparent;
        position: relative;
      }

      .brand-mark::before,
      .brand-mark::after {
        content: "";
        position: absolute;
        background: var(--text-secondary);
      }

      .brand-mark::before {
        width: 12px;
        height: 8px;
        left: 6px;
        top: 7px;
        border-radius: 4px;
      }

      .brand-mark::after {
        width: 6px;
        height: 2px;
        left: 9px;
        top: 15px;
      }

      .app-title,
      .section-title,
      .assistant-title,
      .modal-title,
      .message-title {
        font-weight: 600;
      }

      .menu-row {
        gap: 16px;
        color: var(--text-secondary);
        flex-wrap: wrap;
      }

      .menu-item,
      .icon-button,
      .window-dot,
      .search-shell,
      .project-switcher,
      .tree-item,
      .tool-item,
      .task-item,
      .message-card,
      .input-composer,
      .modal-card,
      .modal-option,
      .composer-action,
      .pill-button,
      .subtle-button,
      .status-chip,
      .item-badge,
      .canvas-glyph,
      .canvas-callout,
      .canvas-bottom-outline,
      .modal-close {
        transition: background-color 150ms ease-out, color 150ms ease-out, filter 150ms ease-out;
      }

      .menu-item {
        color: inherit;
        text-decoration: none;
        cursor: default;
      }

      .topbar-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        justify-content: center;
        gap: 12px;
        min-width: 0;
        padding-right: 0;
        z-index: 2;
      }

      .topbar-combined {
        height: 32px;
        position: relative;
        width: 463px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        color: var(--text-secondary);
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        border-radius: 0;
        background: rgba(255, 255, 255, 0.015);
      }

      .combined-label {
        color: var(--text-secondary);
        white-space: nowrap;
      }

      .combined-left,
      .combined-right {
        height: 100%;
        display: inline-flex;
        align-items: center;
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
      }

      .combined-left {
        flex: 1;
        justify-content: flex-start;
        padding: 0 6px;
      }

      .combined-divider {
        width: 1px;
        height: 16px;
        background: rgba(255, 255, 255, 0.14);
        margin: 0 10px 0 6px;
      }

      .combined-right {
        justify-content: flex-end;
        min-width: 72px;
        padding-right: 6px;
      }

      .combined-right-text {
        color: var(--text-secondary);
      }

      .topbar-panel {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 100%;
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border: 1px solid rgba(40, 40, 40, 0.55);
        border-radius: 16px;
        background: rgba(20, 20, 20, 0.98);
        z-index: 30;
      }

      .topbar-combined.project-open .project-panel,
      .topbar-combined.search-open .search-panel {
        display: flex;
      }

      .search-panel-title {
        color: var(--text-primary);
        font-size: 13px;
      }

      .search-result-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .search-result-item {
        width: 100%;
        text-align: left;
        padding: 8px 10px;
        border-radius: 16px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
      }

      .search-result-item:hover {
        background: var(--hover-bg);
        color: var(--text-primary);
      }

      .search-result-meta {
        margin-top: 2px;
        font-size: 12px;
        color: #6f6f6f;
      }

      .search-result-ellipsis {
        color: var(--text-secondary);
        text-align: center;
        letter-spacing: 2px;
      }

      .topbar-right {
        justify-content: flex-end;
        gap: 12px;
        min-width: 0;
        padding-right: 0;
        margin-right: -6px;
      }

      .topbar-right .window-controls {
        display: none;
      }

      .status-row {
        gap: 8px;
        flex-wrap: wrap;
        position: relative;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 0 12px;
        border: 0 !important;
        border-radius: 999px;
        background: transparent;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .status-button-wrap {
        position: relative;
      }

      .status-button {
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 124px;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        border-radius: 0;
        background: rgba(255, 255, 255, 0.015);
        color: var(--text-secondary);
        font-size: 12px;
        cursor: pointer;
      }

      .status-button:hover {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
      }

      .status-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: 220px;
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        border: 1px solid rgba(40, 40, 40, 0.55);
        border-radius: 16px;
        background: rgba(20, 20, 20, 0.98);
        z-index: 30;
      }

      .status-button-wrap.open .status-panel {
        display: flex;
      }

      .status-panel-option {
        width: 100%;
        text-align: left;
        padding: 8px 10px;
        border-radius: 16px;
        color: var(--text-secondary);
        background: transparent;
        cursor: pointer;
      }

      .window-controls {
        gap: 8px;
      }

      .window-dot {
        width: 12px;
        height: 12px;
        border: 0 !important;
        border-radius: 999px;
        background: transparent;
      }

      .main-grid {
        min-height: 0;
        display: grid;
        min-width: var(--app-min-width);
        grid-template-columns: var(--left-column-w) minmax(716px, 1fr) var(--right-column-w);
        grid-template-areas: "left center right";
        background: var(--body-bg);
      }

      .left-column {
        grid-area: left;
        min-width: 0;
        display: grid;
        grid-template-columns: 42px 1fr;
        border-right: 1px solid var(--line) !important;
        background: var(--column-bg);
      }

      .icon-rail {
        padding: 8px 4px;
        border-right: 1px solid var(--line) !important;
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: var(--column-bg);
      }

      .rail-spacer {
        flex: 1;
      }

      .icon-button {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        color: var(--text-sidebar);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .icon-button:hover,
      .icon-button.active {
        background: var(--hover-bg);
        color: #ffffff;
      }

      .sidebar-stack {
        min-width: 0;
        display: grid;
        grid-template-rows: 1fr;
        gap: 0;
        padding: 6px;
        background: var(--column-bg);
      }

      .sidebar-workspace {
        min-height: 100%;
        border: 1px solid rgba(40, 40, 40, 0.55);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.015);
        padding: 4px;
        display: flex;
        flex-direction: column;
      }

      .section-card {
        border: 0 !important;
        border-radius: 0;
        background: transparent;
        overflow: hidden;
      }

      .section-card:first-child {
        border-top: 0 !important;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 8px 12px;
      }

      .section-caption,
      .item-meta,
      .assistant-meta,
      .composer-meta,
      .modal-caption,
      .message-body,
      .message-line {
        color: var(--text-secondary);
      }

      .section-body {
        padding: 0 8px 8px;
      }

      .sidebar-workspace .section-body {
        padding: 0;
      }

      .pill-button,
      .subtle-button,
      .composer-action {
        background: transparent;
        color: var(--text-sidebar);
        cursor: pointer;
      }

      .pill-button,
      .subtle-button {
        border-radius: 999px;
      }

      .task-list,
      .tool-list,
      .tree-list,
      .message-stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .task-item,
      .tool-item,
      .tree-item {
        padding: 12px 12px;
        border: 0 !important;
        border-radius: 16px;
        background: transparent;
        color: var(--text-sidebar);
      }

      .task-item:hover,
      .tool-item:hover,
      .tree-item:hover,
      .task-item.active,
      .tool-item.active {
        background: var(--hover-bg);
      }

      .item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }

      .item-title {
        color: var(--text-sidebar);
        font-size: 14px;
        line-height: 1.35;
      }

      .task-item:hover .item-title,
      .tool-item:hover .item-title,
      .tree-item:hover .item-title,
      .task-item.active .item-title,
      .tool-item.active .item-title {
        color: var(--text-primary);
      }

      .item-badge {
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 8px;
        border: 0 !important;
        border-radius: 4px;
        background: transparent;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .item-badge.active {
        color: var(--text-primary);
      }

      .tool-list-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .add-tool-large {
        width: 100%;
        min-height: 76px;
        border: 1px solid rgba(40, 40, 40, 0.6) !important;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
      }

      .add-tool-large:hover {
        background: rgba(255, 255, 255, 0.06) !important;
        color: var(--text-primary) !important;
        filter: none !important;
      }

      .subtle-button {
        height: 32px;
        padding: 0 12px;
        font-size: 13px;
      }

      .tree-item.depth-1 {
        margin-left: 12px;
      }

      .tree-item.depth-2 {
        margin-left: 24px;
      }

      .center-column {
        grid-area: center;
        min-width: 0;
        position: relative;
        background: var(--body-bg);
      }

      .canvas-surface {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: 6px;
        gap: 10px;
      }

      .canvas-top {
        height: auto;
        padding: 0;
        color: var(--text-secondary);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .canvas-title {
        margin: 0 0 8px;
        color: var(--text-primary);
        font-size: 18px;
        font-weight: 600;
      }

      .canvas-subtitle {
        margin: 0;
        color: var(--text-secondary);
        max-width: 560px;
        font-size: 14px;
      }

      .canvas-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr));
        gap: 10px;
        min-width: 320px;
      }

      .summary-card {
        padding: 12px 14px;
        border: 1px solid rgba(40, 40, 40, 0.55);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.015);
      }

      .summary-label {
        color: var(--text-secondary);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .summary-value {
        color: var(--text-primary);
        font-size: 14px;
        line-height: 1.4;
      }

      .canvas-area {
        flex: 1;
        display: flex;
      }

      .canvas-center {
        width: 100%;
        min-height: 100%;
        border: 1px solid rgba(40, 40, 40, 0.55);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.015);
        justify-content: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 18px;
        color: var(--text-secondary);
      }

      .canvas-glyph {
        width: 72px;
        height: 52px;
        border: 0 !important;
        border-radius: 4px;
        background: transparent;
        position: relative;
      }

      .canvas-glyph::before,
      .canvas-glyph::after {
        content: "";
        position: absolute;
      }

      .canvas-glyph::before {
        width: 24px;
        height: 8px;
        left: 24px;
        top: 22px;
        background: var(--text-secondary);
        border-radius: 999px;
      }

      .canvas-glyph::after {
        width: 12px;
        height: 12px;
        left: 16px;
        top: 20px;
        border-radius: 4px;
        background: var(--text-secondary);
      }

      .canvas-callout {
        padding: 8px 12px;
        border: 0 !important;
        border-radius: 4px;
        background: transparent;
        color: var(--text-secondary);
        font-size: 16px;
        font-weight: 400;
      }

      .canvas-note {
        max-width: 540px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
      }

      .canvas-bottom-outline {
        margin: 0;
        min-height: 116px;
        border: 1px solid rgba(40, 40, 40, 0.6) !important;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.015);
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        padding: 14px;
      }

      .footer-card {
        padding: 12px;
        border: 1px solid rgba(40, 40, 40, 0.45);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.012);
      }

      .footer-card-title {
        color: var(--text-primary);
        font-size: 13px;
        margin-bottom: 6px;
      }

      .footer-card-meta {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.5;
      }

      .right-column {
        grid-area: right;
        min-width: 0;
        padding: 0;
        border-left: 1px solid var(--line) !important;
        background: var(--column-bg);
      }

      .assistant-panel {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 0;
        border-radius: 0;
        background: var(--column-bg);
        overflow: hidden;
      }

      .assistant-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 10px 8px 20px;
        border-bottom: 0 !important;
        background: var(--column-bg);
      }

      .assistant-title,
      .assistant-meta {
        font-size: 19px;
      }

      .assistant-body {
        min-height: 0;
        overflow: auto;
        padding: 8px 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--column-bg);
      }

      .message-card {
        border: 0 !important;
        border-radius: 4px;
        background: transparent;
        padding: 6px 0;
      }

      .message-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .composer-wrap {
        padding: 6px;
        border-top: 1px solid var(--line) !important;
        background: var(--column-bg);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .composer-chip-row {
        display: none;
      }

      .input-composer {
        border: 1px solid rgba(40, 40, 40, 0.6) !important;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.015);
        padding: 20px 12px 12px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: relative;
      }

      .input-composer:hover,
      .input-composer:focus-within {
        background: var(--hover-bg);
      }

      .input-composer textarea {
        min-height: 136px;
        border: 0;
        outline: 0;
        resize: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 19px;
        font-weight: 400;
        line-height: 1.6;
        padding: 0;
        width: 100%;
        display: block;
      }

      .input-composer-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .composer-toolbar-left,
      .composer-toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .composer-action {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border-radius: 16px;
      }

      .composer-action.primary {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.04);
      }

      .composer-action.primary:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .composer-tool {
        min-width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        padding: 0 8px;
        border-radius: 16px;
        color: var(--text-secondary);
        background: transparent;
      }

      .composer-tool svg {
        width: 16px;
        height: 16px;
      }

      .composer-footer {
        display: none;
      }

      .composer-model-button {
        min-width: 64px;
        height: 38px;
        padding: 0 12px;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-secondary);
        transition: background-color 150ms ease-out;
      }

      .composer-model-button:hover {
        background: rgba(255, 255, 255, 0.12) !important;
        color: var(--text-secondary) !important;
        filter: none !important;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.68);
        z-index: 20;
      }

      .modal-overlay.open {
        display: flex;
      }

      .modal-card {
        width: min(540px, 100%);
        border: 0 !important;
        border-radius: 16px;
        background: var(--column-bg);
        overflow: hidden;
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 0 !important;
        background: var(--column-bg);
      }

      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        cursor: pointer;
      }

      .modal-body {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--column-bg);
      }

      .modal-option {
        width: 100%;
        text-align: left;
        color: var(--text-primary);
        cursor: pointer;
        border: 0 !important;
        border-radius: 16px;
        background: transparent;
        padding: 12px 14px;
      }

      .modal-option-sub {
        color: var(--text-secondary);
        line-height: 1.6;
      }

      @media (max-width: 1180px) {
        .app-shell,
        .app-frame,
        .topbar,
        .main-grid {
          min-width: var(--app-min-width);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-frame">
        <header class="topbar">
          <div class="topbar-left">
            <div class="title-row">
              <div class="app-title">MultiNeiroCreator</div>
            </div>
          </div>

          <div class="topbar-center">
            <div class="topbar-combined" id="topbarCombined">
              <div class="combined-left" id="projectSwitcherButton" aria-expanded="false">
                <span class="combined-label">选择项目</span>
              </div>
              <div class="combined-divider" aria-hidden="true"></div>
              <div class="combined-right" id="searchTrigger" aria-expanded="false">
                <span class="combined-right-text">搜索</span>
              </div>
              <div class="topbar-panel project-panel" id="projectSwitcherList">
                <button class="project-switcher-option">项目列表占位 01</button>
                <button class="project-switcher-option">项目列表占位 02</button>
                <button class="project-switcher-option">项目列表占位 03</button>
              </div>
              <div class="topbar-panel search-panel" id="searchPanel">
                <div class="search-panel-title" id="searchPanelTitle">未搜索到相关内容</div>
                <input type="text" value="" placeholder="" id="searchInput" />
                <div class="search-result-list" id="searchResultList"></div>
                <div class="search-result-ellipsis" id="searchResultEllipsis" hidden>...</div>
              </div>
            </div>
          </div>

          <div class="topbar-right">
            <div class="status-row">
              <div class="status-button-wrap" id="saveModeWrap">
                <button class="status-button" id="saveModeButton" aria-expanded="false">
                  <span>选择保存模式</span>
                  <span>▾</span>
                </button>
                <div class="status-panel" id="saveModePanel">
                  <button class="status-panel-option">保存模式占位 01</button>
                  <button class="status-panel-option">保存模式占位 02</button>
                  <button class="status-panel-option">保存模式占位 03</button>
                </div>
              </div>
            </div>
            <div class="window-controls" aria-hidden="true">
              <div class="window-dot"></div>
              <div class="window-dot"></div>
              <div class="window-dot"></div>
            </div>
          </div>
        </header>

        <main class="main-grid">
          <aside class="left-column">
            <div class="icon-rail" aria-label="Side navigation">
              <button class="icon-button active" title="Explorer">☰</button>
              <div class="rail-spacer"></div>
              <button class="icon-button" title="Settings">⚙</button>
            </div>

            <div class="sidebar-stack">
              <div class="sidebar-workspace">
                <section class="section-card">
                  <div class="section-body">
                    <button class="add-tool-large" id="openModal">添加创作工具 +</button>
                  </div>
                </section>
              </div>
            </div>
          </aside>

          <section class="center-column">
            <div class="canvas-surface">
              <div class="canvas-area">
                <div class="canvas-center">
                  <div class="canvas-callout">创作区，等待加载工具。</div>
                </div>
              </div>
            </div>
          </section>

          <aside class="right-column">
            <div class="assistant-panel">
              <div class="assistant-head">
                <div>
                  <div class="assistant-title">Neyria</div>
                  <div class="assistant-meta">为音乐续写篇章</div>
                </div>
                <div class="window-controls" aria-hidden="true">
                  <div class="window-dot"></div>
                  <div class="window-dot"></div>
                  <div class="window-dot"></div>
                </div>
              </div>

              <div class="assistant-body"></div>

              <div class="composer-wrap">
                <div class="input-composer">
                  <textarea placeholder="我来帮你实现想法！"></textarea>
                  <div class="input-composer-toolbar">
                    <div class="composer-toolbar-left">
                      <button class="composer-tool" title="附件" aria-label="附件">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                          <path d="M21.44 11.05 12.2 20.29a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.48-8.49"></path>
                        </svg>
                      </button>
                    </div>
                    <div class="composer-toolbar-right">
                      <button class="composer-tool" title="Voice">◉</button>
                      <button class="composer-model-button" title="切换模型">Auto ▾</button>
                      <button class="composer-action primary" title="Send">↑</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </aside>
        </main>
      </div>
    </div>

    <div class="modal-overlay" id="toolModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <div class="modal-title" id="modalTitle">添加工具</div>
            <div class="modal-caption">为当前项目追加新的创作模块或 Agent 插件。</div>
          </div>
          <button class="modal-close" id="closeModal" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <button class="modal-option">
            <div class="message-title">Plugin Module</div>
            <div class="modal-option-sub">挂载新的创作能力，例如编曲、混音、PV 或 Live2D Agent。</div>
          </button>
          <button class="modal-option">
            <div class="message-title">Import Workflow</div>
            <div class="modal-option-sub">导入已有工作流模板，把当前项目接入新的流水线。</div>
          </button>
          <button class="modal-option">
            <div class="message-title">Create Sandbox</div>
            <div class="modal-option-sub">建立独立实验区，用于测试新模型、新参数和新模块。</div>
          </button>
        </div>
      </div>
    </div>

    <script>
      const openModalButton = document.getElementById("openModal");
      const closeModalButton = document.getElementById("closeModal");
      const toolModal = document.getElementById("toolModal");
      const topbarCombined = document.getElementById("topbarCombined");
      const projectSwitcherButton = document.getElementById("projectSwitcherButton");
      const searchTrigger = document.getElementById("searchTrigger");
      const saveModeWrap = document.getElementById("saveModeWrap");
      const saveModeButton = document.getElementById("saveModeButton");
      const searchInput = document.getElementById("searchInput");
      const searchPanel = document.getElementById("searchPanel");
      const searchPanelTitle = document.getElementById("searchPanelTitle");
      const searchResultList = document.getElementById("searchResultList");
      const searchResultEllipsis = document.getElementById("searchResultEllipsis");
      const searchIndex = [
        { title: "选择项目", meta: "顶部栏 · 项目切换" },
        { title: "搜索", meta: "顶部栏 · 全局检索入口" },
        { title: "工具", meta: "左侧栏 · Creative Module Library" },
        { title: "添加工具", meta: "左侧栏 · 工具模块操作" },
        { title: "Composer Agent", meta: "左侧栏 · 创作模块" },
        { title: "Lyrics Agent", meta: "左侧栏 · 创作模块" },
        { title: "Visual Agent", meta: "左侧栏 · 创作模块" },
        { title: "创作区", meta: "中间区域 · 工作区" },
        { title: "TRAE", meta: "右侧栏 · AI 助手面板" },
        { title: "上传文件", meta: "右下输入区 · 功能按钮" },
        { title: "语音对话", meta: "右下输入区 · 功能按钮" },
        { title: "切换模型", meta: "右下输入区 · Auto 按钮" }
      ];

      function renderSearchResults(query) {
        const keyword = query.trim().toLowerCase();
        searchResultList.innerHTML = "";

        if (!keyword) {
          searchPanelTitle.textContent = "未搜索到相关内容";
          searchResultEllipsis.hidden = true;
          return;
        }

        const results = searchIndex
          .map((item) => {
            const score = `${item.title} ${item.meta}`.toLowerCase().includes(keyword) ? 1 : 0;
            return { ...item, score };
          })
          .filter((item) => item.score > 0)
          .slice(0, 5);

        if (!results.length) {
          searchPanelTitle.textContent = "未搜索到相关内容";
          searchResultEllipsis.hidden = true;
          return;
        }

        searchPanelTitle.textContent = "搜索到以下相关内容";
        results.forEach((item) => {
          const button = document.createElement("button");
          button.className = "search-result-item";
          button.innerHTML = `<div>${item.title}</div><div class="search-result-meta">${item.meta}</div>`;
          searchResultList.appendChild(button);
        });
        searchResultEllipsis.hidden = false;
      }

      openModalButton.addEventListener("click", () => {
        toolModal.classList.add("open");
        toolModal.setAttribute("aria-hidden", "false");
      });

      closeModalButton.addEventListener("click", () => {
        toolModal.classList.remove("open");
        toolModal.setAttribute("aria-hidden", "true");
      });

      toolModal.addEventListener("click", (event) => {
        if (event.target === toolModal) {
          toolModal.classList.remove("open");
          toolModal.setAttribute("aria-hidden", "true");
        }
      });

      projectSwitcherButton.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = topbarCombined.classList.toggle("project-open");
        topbarCombined.classList.remove("search-open");
        projectSwitcherButton.setAttribute("aria-expanded", String(isOpen));
        searchTrigger.setAttribute("aria-expanded", "false");
      });

      searchTrigger.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = topbarCombined.classList.toggle("search-open");
        topbarCombined.classList.remove("project-open");
        searchTrigger.setAttribute("aria-expanded", String(isOpen));
        projectSwitcherButton.setAttribute("aria-expanded", "false");
        if (isOpen) {
          renderSearchResults(searchInput.value);
          searchInput.focus();
        }
      });

      saveModeButton.addEventListener("click", (event) => {
        event.stopPropagation();
        const isOpen = saveModeWrap.classList.toggle("open");
        saveModeButton.setAttribute("aria-expanded", String(isOpen));
      });

      document.addEventListener("click", (event) => {
        if (!topbarCombined.contains(event.target)) {
          topbarCombined.classList.remove("project-open");
          topbarCombined.classList.remove("search-open");
          projectSwitcherButton.setAttribute("aria-expanded", "false");
          searchTrigger.setAttribute("aria-expanded", "false");
        }

        if (!saveModeWrap.contains(event.target)) {
          saveModeWrap.classList.remove("open");
          saveModeButton.setAttribute("aria-expanded", "false");
        }
      });

      searchInput.addEventListener("focus", () => {
        topbarCombined.classList.add("search-open");
        renderSearchResults(searchInput.value);
      });

      searchInput.addEventListener("click", (event) => {
        event.stopPropagation();
        topbarCombined.classList.add("search-open");
        renderSearchResults(searchInput.value);
      });

      searchInput.addEventListener("input", () => {
        topbarCombined.classList.add("search-open");
        renderSearchResults(searchInput.value);
      });

    </script>
  </body>
</html>
